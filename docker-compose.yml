services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # O Docker Compose le automaticamente o .env para interpolar ${VAR}
      # Nao e necessario env_file — evita expor credenciais desnecessarias ao container
      - "OLLAMA_BASE_URL=http://host.docker.internal:11434"
      - "WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}"
    volumes:
      - open-webui:/app/backend/data
    healthcheck:
      # Aguarda 120s antes de iniciar os checks — necessario no primeiro boot
      # (migracoes de DB + download de modelos de embedding)
      start_period: 120s
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  open-webui:
